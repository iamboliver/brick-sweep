name: BrickSweep
options:
  bundleIdPrefix: com.oliverbarwell
  deploymentTarget:
    iOS: "18.0"
  xcodeVersion: "16.0"
  minimumXcodeGenVersion: "2.38.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete

targets:
  BrickSweep:
    type: application
    platform: iOS
    sources:
      - BrickSweep
    resources:
      - path: BrickSweep/PrivacyInfo.xcprivacy
    info:
      path: BrickSweep/Info.plist
      properties:
        UILaunchScreen: {}
        CFBundleDisplayName: BrickSweep
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.oliverbarwell.BrickCheck
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

  BrickSweepTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - BrickSweepTests
    dependencies:
      - target: BrickSweep
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.oliverbarwell.BrickCheckTests
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/BrickSweep.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/BrickSweep"
        BUNDLE_LOADER: "$(TEST_HOST)"
